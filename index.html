<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storefront — Shop Everything</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/skeleton.css" />
    <link rel="stylesheet" href="css/darkmode.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ===== HEADER ===== -->
    <header class="site-header">
      <div class="header-inner">

        <!-- Brand -->
        <a class="brand" href="#">
          <i class="fa-solid fa-bag-shopping" aria-hidden="true"></i>
          <span>Storefront</span>
        </a>

        <!-- Mobile nav drawer (hidden on desktop) -->
        <nav class="mobile-nav" id="mobileNav" aria-label="Mobile navigation" aria-hidden="true">
          <button class="mobile-nav-close" id="mobileNavClose" aria-label="Close navigation menu">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
          <ul class="mobile-nav-links" role="list">
            <li><a class="mobile-nav-link" href="#">Home</a></li>
            <li><a class="mobile-nav-link" href="#">Shop</a></li>
            <li><a class="mobile-nav-link" href="#">About</a></li>
            <li><a class="mobile-nav-link" href="#">Contact</a></li>
          </ul>
        </nav>
        <!-- Overlay that dims content behind mobile nav -->
        <div class="mobile-nav-overlay" id="mobileNavOverlay" aria-hidden="true"></div>

        <!-- Right-side icon cluster -->
        <div class="header-actions">
          <!-- Dark-mode toggle (wired in Section E/F) -->
          <button class="icon-btn" id="darkModeToggle" aria-label="Switch to dark mode">
            <i class="fa-regular fa-moon" aria-hidden="true"></i>
          </button>

          <!-- Wishlist toggle (Bonus) -->
          <button class="icon-btn wishlist-toggle-btn" id="wishlistToggle" aria-label="Open wishlist">
            <i class="fa-regular fa-heart" aria-hidden="true"></i>
            <span class="cart-badge wishlist-badge" id="wishlistBadge" hidden>0</span>
          </button>

          <!-- Cart (wired in Section D) -->
          <button class="icon-btn cart-btn" id="cartToggle" aria-label="Open cart">
            <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i>
            <span class="cart-badge" id="cartBadge" hidden>0</span>
          </button>

          <!-- Hamburger — visible only on mobile (Section G) -->
          <button class="icon-btn hamburger-btn" id="hamburgerBtn"
                  aria-label="Open navigation menu"
                  aria-expanded="false"
                  aria-controls="mobileNav">
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
          </button>
        </div>

      </div>
    </header>

    <!-- ===== HERO STRIP ===== -->
    <section class="hero">
      <div class="hero-inner">
        <p class="hero-eyebrow">New arrivals · Free shipping over $50</p>
        <h1 class="hero-headline">Everything you need,<br />nothing you don't.</h1>
      </div>
    </section>

    <!-- ===== FILTER BAR (Section B) ===== -->
    <div class="filter-bar">
      <div class="filter-bar-inner">

        <!-- Search -->
        <div id="searchBarContainer" class="filter-slot filter-slot--search"></div>

        <!-- Category pills -->
        <div id="categoryButtons" class="filter-slot filter-slot--categories"
             role="group" aria-label="Filter by category">
          <!-- Injected by filters.js -->
        </div>

        <!-- Sort + Clear -->
        <div class="filter-slot filter-slot--controls">
          <div id="sortContainer"></div>
          <div id="clearFiltersContainer"></div>
        </div>

      </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">

      <div class="toolbar">
        <p class="product-count" id="productCount">Loading products…</p>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState" hidden aria-live="polite">
        <i class="fa-solid fa-box-open empty-state-icon" aria-hidden="true"></i>
        <p class="empty-state-title">No products found</p>
        <p class="empty-state-message">
          Try a different search term, adjust your filters, or
          <button class="empty-state-clear" id="emptyStateClear">clear all filters</button>
          to see everything.
        </p>
      </div>

      <!-- Product grid -->
      <div class="product-grid" id="productGrid" aria-live="polite" aria-label="Product listing">
      </div>

      <!-- Load More button — injected by filters.js renderLoadMoreButton() -->
      <div class="load-more-container" id="loadMoreContainer" aria-live="polite"></div>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer">
      <p>&copy; 2025 Storefront. All rights reserved.</p>
    </footer>

    <!-- ===== CART DRAWER (Section D) ===== -->
    <aside class="cart-drawer" id="cartDrawer" aria-hidden="true"></aside>
    <div class="cart-overlay" id="cartOverlay"></div>

    <!-- ===== PRODUCT MODAL (Section C) ===== -->
    <dialog class="product-modal" id="productModal"></dialog>

    <!-- ===== WISHLIST PANEL (Bonus) ===== -->
    <aside class="wishlist-panel" id="wishlistPanel" aria-label="Wishlist" aria-hidden="true"></aside>
    <div class="wishlist-overlay" id="wishlistOverlay"></div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
